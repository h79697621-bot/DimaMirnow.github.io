<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Builder — твой код → приложение</title>
    <style>
        body {
            background: #0f172a;
            font-family: system-ui;
            color: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #00ff9d;
            font-family: monospace;
            padding: 16px;
        }
        button {
            background: #3b82f6;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>📱 APK Builder</h1>
    <p>Вставь HTML код — получи APK</p>
    
    <textarea id="code" placeholder='<h1>Моё приложение</h1>'></textarea>
    <br>
    <input type="text" id="appName" placeholder="Название приложения" style="width:100%; padding:12px; margin-top:12px; background:#1e293b; border:1px solid #334155; border-radius:12px; color:white;">
    <br>
    <button id="buildBtn">🚀 Собрать APK</button>
    <div id="status" class="status"></div>

    <script>
        document.getElementById('buildBtn').onclick = async () => {
            const code = document.getElementById('code').value;
            const appName = document.getElementById('appName').value || 'MyApp';
            const statusDiv = document.getElementById('status');
            
            if (!code.trim()) {
                statusDiv.style.display = 'block';
                statusDiv.style.background = '#7f1a1a';
                statusDiv.innerText = '❌ Вставь HTML код!';
                return;
            }
            
            statusDiv.style.display = 'block';
            statusDiv.style.background = '#1e3a5f';
            statusDiv.innerText = '⏳ Отправка на сервер...';
            
            // Здесь нужен API сервер для сборки APK
            // Без него этот код не заработает — нужно развернуть бэкенд
            
            statusDiv.style.background = '#7f1a1a';
            statusDiv.innerText = '❌ Нужен API сервер. Смотри инструкцию ниже.';
        };
    </script>
</body>
</html>
