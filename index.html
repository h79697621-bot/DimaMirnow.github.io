<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skulpt — лёгкий Python в браузере</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; }
        textarea { width: 100%; height: 300px; font-family: monospace; font-size: 14px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; }
        pre { background: #fff; padding: 15px; border: 1px solid #ddd; overflow: auto; min-height: 200px; }
        .error { color: red; }
    </style>
    <script src="https://skulpt.org/js/skulpt.min.js"></script>
    <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
</head>
<body>
<div class="container">
    <h1>🐍 Skulpt — Python в браузере</h1>
    <textarea id="code">
# Простой код на Python
for i in range(5):
    print(f"Привет, мир! Шаг {i}")

# Черепашья графика
import turtle

t = turtle.Turtle()
t.speed(1)
for color in ['red', 'green', 'blue']:
    t.color(color)
    t.forward(100)
    t.left(120)
    </textarea>
    <br>
    <button onclick="runit()">▶ Запустить</button>
    <button onclick="clearOutput()">🗑 Очистить</button>
    <h3>Вывод:</h3>
    <pre id="output"></pre>
</div>

<script>
function outf(text) {
    const output = document.getElementById("output");
    output.innerHTML += text;
}

function builtinRead(x) {
    if (Sk.builtinFiles === undefined || Sk.builtinFiles.files[x] === undefined)
        throw "File not found: " + x;
    return Sk.builtinFiles.files[x];
}

function clearOutput() {
    document.getElementById("output").innerHTML = '';
}

function runit() {
    const code = document.getElementById("code").value;
    const output = document.getElementById("output");
    output.innerHTML = '';
    
    Sk.configure({
        output: outf,
        read: builtinRead,
        __future__: Sk.python3
    });
    
    try {
        Sk.misceval.asyncToPromise(function() {
            return Sk.importMainWithBody('<stdin>', false, code, false);
        });
    } catch (e) {
        output.innerHTML += `<span class="error">Ошибка: ${e.toString()}</span>`;
    }
}
</script>
</body>
</html>
